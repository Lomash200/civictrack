server:
  port: ${PORT:8080}

spring:
  application:
    name: complaint-system
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:complaint_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:ChangeThisSecretKeyInProductionToSomethingLongAndRandom123456}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  upload:
    dir: ${UPLOAD_DIR:uploads}
  cors:
    allowed-origins: ${CORS_ORIGIN:http://localhost:5173}
  ai:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3}
    enabled: ${OLLAMA_ENABLED:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
